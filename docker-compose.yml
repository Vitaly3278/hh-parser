version: '3.8'

services:
  # Трекер вакансий
  hh-tracker:
    build: .
    container_name: hh-vacancy-tracker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "main.py"]

  # Веб-интерфейс
  hh-web:
    build: .
    container_name: hh-web-interface
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    command: ["python", "run_web.py"]
    depends_on:
      - hh-tracker
